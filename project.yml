name: OpenFlight
options:
  bundleIdPrefix: com.openflight
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

targets:
  OpenFlight:
    type: application
    platform: iOS
    sources:
      - path: OpenFlightApp
        excludes:
          - LiveActivity/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openflight.app
        INFOPLIST_FILE: OpenFlightApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenFlightApp/OpenFlight.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_LIVE_ACTIVITIES: "YES"
    dependencies:
      - target: OpenFlightWidgetExtension

  OpenFlightWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenFlightApp/LiveActivity
      - path: OpenFlightApp/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openflight.app.widget
        INFOPLIST_FILE: OpenFlightApp/LiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenFlightApp/LiveActivity/OpenFlightWidget.entitlements
        SUPPORTS_LIVE_ACTIVITIES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
